<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIOTA - Sistem Informasi Organisasi Terpadu</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SIOTA">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/000000/shield.png">
    <style>
        body {
            margin: 0;
        }
        iframe {
            display: block;
            width: 100%; /* Mengisi seluruh lebar viewport */
            height: 100vh;
            border: none;
            background: lightyellow;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbzlJ6wN1V0eoBN9_--EUHgKhmWB2rh65r9BhREl-V1oFnSZnmIvjOa7g6GnY9ydmKs5/exec" allow="camera"></iframe>
    
    <!-- Registrasi Service Worker untuk PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker terdaftar dengan sukses: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('Pendaftaran ServiceWorker gagal: ', error);
                    });
            });
        }
    </script>
</body>
</html>
